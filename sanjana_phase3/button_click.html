<!DOCTYPE html>
<html>
<head>
    <title>Change Text</title>
</head>
<body>

<p id="text">Hello</p>
<button id="btn">Click Me</button>

<script>
document.getElementById("btn").addEventListener("click", function() {
    document.getElementById("text").innerHTML = "Text Changed!";
});
</script>

</body>
</html>
