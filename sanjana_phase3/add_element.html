<!DOCTYPE html>
<html>
<head>
    <title>Query Selector</title>
</head>
<body>

<h2>List</h2>

<ul id="head">
    <li>item1</li> 
    <li>item2</li>
    <li>item3</li>
</ul>

<button onclick="addItem()">Add Item</button>
<button onclick="removeItem()">Remove Item</button>

<script>
function addItem() {
    let li = document.createElement("li");

    li.textContent = "tablet";

    document.getElementById("head").appendChild(li);
    document.getElementById("head").appendChild(li);
    document.getElementById("head").appendChild(li);  
}

function removeItem() {
    let list = document.getElementById("head");

    if (list.lastElementChild) {
        list.removeChild(list.lastElementChild);
    }
}
console.log("Add and Remove Element functions executed successfully");
</script>

</body>
</html>
