<!DOCTYPE html>
<html>
<head>
    <title>Display Properties</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Display Properties</h1>
    <h2>Block:</h2>
    <div class="block">Block Element 1</div>
    <div class="block">Block Element 2</div>

    <h2>Inline:</h2>
    <span class="inline">Inline 1</span>
    <span class="inline">Inline 2</span>

    <h2>Inline-Block:</h2>
    <div class="inline-block">Box 1</div>
    <div class="inline-block">Box 2</div>

    <h2>None:</h2>
    <div class="none">You cannot see me</div>
</body>
</html>
