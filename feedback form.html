<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
</head>
<body>

<h1>Feedback</h1>

<form action="/submit-feedback"
method="post">
    <label for="feedback">Your Feedback</label><br>
    <textarea required></textarea><br><br>

    <label>Rating:</label>
    <select>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
    </select><br><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
